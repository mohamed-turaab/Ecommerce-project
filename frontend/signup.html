<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Goobo-Market</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FFC107%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-family=%22Outfit,sans-serif%22 font-size=%2270%22 font-weight=%22900%22 fill=%22black%22>G</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/shared.css">
</head>
<body class="bg-dark text-light font-inter">
    <div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="auth-card rv show" style="background: var(--surface-color); padding: 4rem; border-radius: 32px; border: 1px solid var(--border-color); width: 100%; max-width: 500px;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <a href="/home.html" class="logo" style="justify-content: center; margin-bottom: 2rem;"><span>G</span> GOOBO-MARKET</a>
                <h1 style="font-size: 2.5rem; font-weight: 950; letter-spacing: -1px;">Join Us</h1>
                <p style="color: var(--text-muted);">Create an account to start shopping.</p>
            </div>
            
            <form id="signup-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group">
                    <label style="display: block; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-dim);">Full Name</label>
                    <input type="text" id="name" required style="width: 100%; background: #000; border: 1px solid var(--border-color); padding: 1rem; border-radius: 12px; color: #fff; font-family: inherit;">
                </div>
                <div class="input-group">
                    <label style="display: block; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-dim);">Email Address</label>
                    <input type="email" id="email" required style="width: 100%; background: #000; border: 1px solid var(--border-color); padding: 1rem; border-radius: 12px; color: #fff; font-family: inherit;">
                </div>
                <div class="input-group">
                    <label style="display: block; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-dim);">Password</label>
                    <input type="password" id="password" required style="width: 100%; background: #000; border: 1px solid var(--border-color); padding: 1rem; border-radius: 12px; color: #fff; font-family: inherit;">
                </div>
                <button type="submit" class="btn btn-accent" style="width: 100%; justify-content: center; padding: 1.25rem;">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <p style="color: var(--text-muted);">Already have an account? <a href="/signin.html" style="color: var(--accent-color); font-weight: 800; text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleSignup(name, email, password);
        });
    </script>
</body>
</html>
