<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access – Goobo-Market</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FFC107%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-family=%22Outfit,sans-serif%22 font-size=%2270%22 font-weight=%22900%22 fill=%22black%22>G</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
</head>
<body style="background: radial-gradient(circle at center, #111 0%, #000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="container" style="display: flex; align-items: center; justify-content: center;">
        <div class="auth-card" style="background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px); padding: 4rem; border-radius: 32px; border: 1px solid var(--border-color); width: 100%; max-width: 480px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);">
            <div style="text-align: center; margin-bottom: 3.5rem;">
                <div style="background: var(--accent-color); color: #000; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin: 0 auto 2rem; font-size: 1.5rem; box-shadow: 0 10px 30px var(--accent-glow);">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 style="font-size: 2.5rem; font-weight: 950; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1;">Admin Portal</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 1rem;">Enter your credentials to manage the platform.</p>
            </div>
            
            <form id="admin-login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group">
                    <label style="display: block; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.75rem; color: var(--text-dim); letter-spacing: 1px;">Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@goobo.com" style="width: 100%; background: #000; border: 1px solid var(--border-color); padding: 1.25rem; border-radius: 16px; color: #fff; font-family: inherit; transition: border-color 0.3s;">
                </div>
                <div class="input-group">
                    <label style="display: block; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.75rem; color: var(--text-dim); letter-spacing: 1px;">Secure Password</label>
                    <input type="password" id="password" required placeholder="••••••••" style="width: 100%; background: #000; border: 1px solid var(--border-color); padding: 1.25rem; border-radius: 16px; color: #fff; font-family: inherit; transition: border-color 0.3s;">
                </div>
                <button type="submit" class="btn btn-accent" style="width: 100%; justify-content: center; padding: 1.25rem; margin-top: 1rem; font-size: 1rem;">Authenticate Access</button>
            </form>

            <div style="text-align: center; margin-top: 2.5rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                <a href="signin.html" style="color: var(--text-muted); font-size: 0.75rem; text-decoration: none; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; transition: color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-muted)'">Return to Customer Sign In</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleLogin(email, password, true); // isAdmin = true
        });
    </script>
</body>
</html>
