<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop – Goobo-Market</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FFC107%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-family=%22Outfit,sans-serif%22 font-size=%2270%22 font-weight=%22900%22 fill=%22black%22>G</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FFC107%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-family=%22Outfit,sans-serif%22 font-size=%2270%22 font-weight=%22900%22 fill=%22black%22>G</text></svg>">
    <meta name="description" content="Browse our premium collection of curated products from Goobo-Market.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/shared.css">
    <style>
        /* ── Category Page Specific Styles ── */
        .category-hero {
            padding: 6rem 0 4rem;
            border-bottom: 1px solid var(--border-color);
            background: radial-gradient(ellipse at top, rgba(255,193,7,0.06) 0%, transparent 60%);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
        }

        .breadcrumb a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb a:hover { color: var(--accent-color); }
        .breadcrumb i { font-size: 0.6rem; }

        .category-hero-inner {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .category-hero-text .cat-icon {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
            display: block;
        }

        .category-hero-text h1 {
            font-size: 4.5rem;
            font-weight: 950;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .category-hero-text p {
            color: var(--text-muted);
            font-size: 1.15rem;
            max-width: 500px;
        }

        .product-count-badge {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.25);
            color: var(--accent-color);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            align-self: flex-start;
            margin-top: 1rem;
        }

        .products-section {
            padding: 5rem 0 8rem;
        }

        .filters-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .results-count {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .results-count span {
            color: var(--text-main);
        }

        .sort-select {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.3s;
            outline: none;
        }

        .sort-select:hover, .sort-select:focus {
            border-color: var(--accent-color);
        }

        /* Product Grid for category - 3 or 4 col */
        .product-grid-cat {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .prod-card {
            background: var(--card-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            flex-direction: column;
        }

        .prod-card:hover {
            border-color: rgba(255,193,7,0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .prod-img {
            height: 260px;
            background: #111;
            overflow: hidden;
            position: relative;
        }

        .prod-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .prod-card:hover .prod-img img {
            transform: scale(1.08);
        }

        .prod-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--accent-color);
            color: #000;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
        }

        .prod-info {
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .prod-category-tag {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .prod-name {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .prod-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prod-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .prod-price-wrap {}
        .prod-price {
            font-size: 1.75rem;
            font-weight: 950;
            color: var(--accent-color);
            letter-spacing: -1px;
        }

        .prod-rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
        }

        .prod-rating i {
            color: var(--accent-color);
            font-size: 0.7rem;
        }

        .btn-cart {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            color: var(--accent-color);
            padding: 0.7rem 1.25rem;
            border-radius: 50px;
            font-family: var(--font-sans);
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-cart:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 8rem 2rem;
        }

        .empty-state i {
            font-size: 5rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            display: block;
        }

        .empty-state h3 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skel-card {
            background: var(--card-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .skel-img { height: 260px; }
        .skel-body { padding: 1.75rem; }
        .skel-line { height: 14px; margin-bottom: 12px; border-radius: 4px; }
        .skel-line.w-60 { width: 60%; }
        .skel-line.w-40 { width: 40%; }
        .skel-line.w-80 { width: 80%; }
        .skel-btn { height: 40px; border-radius: 50px; margin-top: 1.5rem; }

        @media (max-width: 768px) {
            .category-hero-text h1 { font-size: 3rem; letter-spacing: -2px; }
            .category-hero-inner { flex-direction: column; align-items: flex-start; }
            .product-grid-cat { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 520px) {
            .product-grid-cat { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar-content">
            <a href="/home.html" class="logo">
                <span>G</span> GOOBO-MARKET
            </a>
            <nav id="main-nav">
                <ul>
                    <li><a href="/home">Home</a></li>
                    <li><a href="/home#categories">Collections</a></li>
                    <li><a href="/home#products">Shop</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="/cart.html" class="btn btn-outline"><i class="fas fa-shopping-cart"></i> <span>Cart</span></a>
                <a href="/signin.html" id="auth-btn" class="btn btn-accent"><span>Sign In</span></a>
                <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <section class="category-hero">
        <div class="container">
            <div class="breadcrumb">
                <a href="/home.html">Home</a>
                <i class="fas fa-chevron-right"></i>
                <a href="/home.html#categories">Collections</a>
                <i class="fas fa-chevron-right"></i>
                <span id="breadcrumb-name">Loading...</span>
            </div>
            <div class="category-hero-inner">
                <div class="category-hero-text rv">
                    <i id="cat-icon" class="fas fa-tag cat-icon"></i>
                    <h1 id="cat-title">Loading...</h1>
                    <p id="cat-desc">Discover our premium curated selection.</p>
                </div>
                <span id="product-count-badge" class="product-count-badge rv" style="transition-delay:100ms">
                    <i class="fas fa-box"></i> — products
                </span>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="container">
            <div class="filters-bar">
                <p class="results-count" id="results-text">Loading products...</p>
                <select class="sort-select" id="sort-select" onchange="applySortAndRender()">
                    <option value="default">Sort: Default</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>
            <div class="product-grid-cat" id="product-grid">
                
                <div class="loading-spinner" style="grid-column:1/-1; padding:8rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size:3rem; color:var(--accent-color);"></i>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 Goobo-Market. Simple. Fast. Best. All rights reserved.</p>
        </div>
    </footer>

    <script src="/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/category.js"></script>
</body>
</html>
